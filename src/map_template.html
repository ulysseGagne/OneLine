<!DOCTYPE html>
<html><head>
<meta charset="utf-8"/>
<title>Route Editor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #map { height: 100vh; width: 100vw; }

  .panel {
    position: fixed; top: 12px; right: 12px; z-index: 9999;
    background: #fff; border-radius: 10px; width: 300px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18); overflow: hidden;
    max-height: calc(100vh - 24px); overflow-y: auto;
  }
  .panel-header {
    background: #1a1a2e; color: #fff; padding: 14px 16px;
    font-size: 15px; font-weight: 600;
  }
  .panel-body { padding: 12px 16px; }

  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 14px; }
  .mode-btn {
    padding: 9px 6px; border: 2px solid #ddd; border-radius: 8px;
    background: #fff; cursor: pointer; font-size: 11.5px; font-weight: 700;
    text-align: center; transition: all 0.15s; text-transform: uppercase;
    letter-spacing: 0.3px; display: flex; align-items: center;
    justify-content: center; gap: 5px;
  }
  .mode-btn:hover { border-color: #999; background: #fafafa; }
  .mode-btn.active-delete    { border-color: #f00; background: #fee; color: #c00; }
  .mode-btn.active-add-node  { border-color: #0cc; background: #d0fffe; color: #077; }
  .mode-btn.active-draw-road { border-color: #0cc; background: #d0fffe; color: #077; }
  .mode-btn.active-draw-path { border-color: #080; background: #ded; color: #050; }
  .mode-btn.active-split     { border-color: #0cc; background: #d0fffe; color: #077; }
  .mode-grid > :first-child  { grid-column: 1 / -1; }
  .mode-btn.active-start     { border-color: #333; background: #f0f0f0; color: #000; }
  .mode-btn.active-end       { border-color: #333; background: #f0f0f0; color: #333; }
  .color-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .color-dot.white { background: #fff; border: 2px solid #333; }

  .mode-hint {
    font-size: 11.5px; color: #666; background: #f5f5f5; border-radius: 6px;
    padding: 8px 10px; margin-bottom: 12px; line-height: 1.5;
  }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: #888; margin-bottom: 4px; margin-top: 10px;
  }
  .stats {
    font-size: 12px; color: #555; line-height: 1.8;
    padding: 8px 0; border-bottom: 1px solid #eee; margin-bottom: 8px;
  }
  .stats .num { font-weight: 700; }
  .stats .c-del { color: #f00; }
  .stats .c-grn { color: #060; }
  .stats .c-blk { color: #000; }

  .export-btn {
    display: block; width: 100%; padding: 12px; margin-top: 12px;
    background: #1a1a2e; color: #fff; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .export-btn:hover { background: #2d2d4e; }
  .export-btn.exported { background: #4CAF50; }

  .node-info {
    font-size: 11.5px; color: #999; margin-top: 10px;
    padding-top: 8px; border-top: 1px solid #eee; min-height: 18px;
  }
  .undo-hint {
    font-size: 10px; color: #bbb; text-align: center; margin-top: 6px;
  }

  .selection-bar {
    font-size: 12px; padding: 6px 10px; border-radius: 6px;
    margin-bottom: 8px; display: none;
  }
  .selection-bar.visible {
    display: block; background: #ded; color: #050; border: 1px solid #080;
  }

  .node-label {
    background: rgba(0,0,0,0.75); color: #fff; border: none; border-radius: 3px;
    padding: 1px 4px; font: bold 11px monospace; white-space: nowrap; pointer-events: none;
  }
</style>
</head><body>
<div id="map"></div>
<div class="panel">
  <div class="panel-header">Route Editor</div>
  <div class="panel-body">
    <div class="mode-grid">
      <div class="mode-btn active-delete" id="btn-delete" onclick="setMode('delete')">
        <span class="color-dot" style="background:#f00"></span> Delete
      </div>
      <div class="mode-btn" id="btn-start" onclick="setMode('start')">
        <span class="color-dot" style="background:#000"></span> Start
      </div>
      <div class="mode-btn" id="btn-end" onclick="setMode('end')">
        <span class="color-dot white"></span> End
      </div>
      <div class="mode-btn" id="btn-draw-road" onclick="setMode('draw-road')">
        <span class="color-dot" style="background:#0cc"></span> Draw Road
      </div>
      <div class="mode-btn" id="btn-draw-path" onclick="setMode('draw-path')">
        <span class="color-dot" style="background:#080"></span> Draw Path
      </div>
      <div class="mode-btn" id="btn-add-node" onclick="setMode('add-node')">
        <span class="color-dot" style="background:#0cc"></span> Add Node
      </div>
      <div class="mode-btn" id="btn-split" onclick="setMode('split')">
        <span class="color-dot" style="background:#0cc"></span> Split
      </div>
    </div>

    <div class="mode-hint" id="mode-hint"></div>
    <div class="selection-bar" id="selection-bar"></div>

    <div class="section-label">Summary</div>
    <div class="stats" id="stats"></div>

    <div style="display:flex;gap:6px">
      <button class="export-btn" id="import-btn" onclick="doImport()" style="background:#444">⬆ Import</button>
      <button class="export-btn" id="export-btn" onclick="doExport()">⬇ Export</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImportFile(event)">
    <div class="undo-hint">⌘Z / Ctrl+Z to undo · ⌘⇧Z / Ctrl+⇧Z to redo</div>
    <div class="node-info" id="node-info">Hover over a node for details</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   DATA
   ══════════════════════════════════════════════ */
var CENTER         = %%CENTER%%;
var EDGES          = %%EDGES%%;
var NODES          = %%NODES%%;
var SLUG           = "%%SLUG%%";
var INITIAL_EDITS  = %%INITIAL_EDITS%%;

/* ══════════════════════════════════════════════
   COLORS
   ══════════════════════════════════════════════ */
var C_MAIN      = "#06f";
var C_SECONDARY = "#e8e8e8";
var C_DELETED   = "#f00";
var C_GREEN     = "#080";
var C_CYAN      = "#0cc";
var C_START     = "#000";
var C_END       = "#fff";
var C_EDGE_MAIN = "#06f";
var C_EDGE_MIX  = "#f80";

/* ══════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════ */
var mode = "delete";

var deletedIds   = {};
var deletedEdges = {};
var splitHiddenEdges = {};  // edges hidden because they were split (not shown as red)
var includedIds  = {};
var startIds     = {};
var endIds       = {};

var createdNodes = [];
var createdEdges = [];
var nextNewId    = 0;
var edgeSource   = null;

// Secondary-to-secondary edges not drawn initially; revealed on node inclusion
var secEdgeData = {};

// Undo/redo stacks: each entry is {type, ...data to reverse}
var undoStack = [];
var redoStack = [];
var MAX_UNDO  = 200;

// Leaflet
var markerMap      = {};
var createdMarkers = {};
var edgeLineMap    = {};
var createdLines   = [];

/* ══════════════════════════════════════════════
   MAP
   ══════════════════════════════════════════════ */
var map = L.map("map").setView(CENTER, 15);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 20, subdomains: "abcd"
}).addTo(map);
// Nodes render in a dedicated pane above all edges so clicks always target nodes first
map.createPane('nodePane');
map.getPane('nodePane').style.zIndex = 450;

var nodeMainMap = {};
NODES.forEach(function(n) { nodeMainMap[n.id] = n.is_main; });

// Draw edges
var edgeKeyCounter = {};
EDGES.forEach(function(e) {
  var uMain = nodeMainMap[e.u];
  var vMain = nodeMainMap[e.v];
  var base = Math.min(e.u, e.v) + "-" + Math.max(e.u, e.v);
  if (!(base in edgeKeyCounter)) edgeKeyCounter[base] = 0;
  var key = base + "_" + edgeKeyCounter[base]++;
  if (!uMain && !vMain) {
    // Secondary-to-secondary: store for later reveal, don't draw yet
    secEdgeData[key] = { coords: e.coords, u: e.u, v: e.v };
    return;
  }
  var bothMain = uMain && vMain;
  var color = bothMain ? C_EDGE_MAIN : C_EDGE_MIX;
  var line   = L.polyline(e.coords, { color: color, weight: 4,  opacity: 1.0 }).addTo(map);
  var hitbox = L.polyline(e.coords, { color: color, weight: 18, opacity: 0   }).addTo(map);
  edgeLineMap[key] = { line: line, hitbox: hitbox, u: e.u, v: e.v, bothMain: bothMain, coords: e.coords };
  line.on("click",   function(ev) { onEdgeClick(key, ev.latlng); });
  hitbox.on("click", function(ev) { onEdgeClick(key, ev.latlng); });
});

// Draw nodes
NODES.forEach(function(n) {
  var color = n.is_main ? C_MAIN : C_SECONDARY;
  var marker = L.circleMarker([n.lat, n.lon], {
    radius: 7, fillColor: color, color: "#fff", weight: 1, fillOpacity: 1.0, pane: 'nodePane'
  }).addTo(map);
  marker.bindTooltip(String(n.id), {
    permanent: false, direction: "top", offset: [0, -6], className: "node-label"
  });
  marker.on("click", function() { onNodeClick(n.id); });
  marker.on("mouseover", function() {
    document.getElementById("node-info").textContent =
      "Node " + n.id + " | " + n.neighborhood + " | deg: " + n.deg +
      " | OSM: " + n.osm + " | " + getNodeStatus(n.id);
  });
  markerMap[n.id] = marker;
  marker._nodeData = n;
});

// Map click for add-node mode
map.on("click", function(e) {
  // Marker clicks set this flag; small timeout to handle race condition
  if (window._markerClickFlag) { window._markerClickFlag = false; return; }
  // Background click clears edge source selection in draw modes
  if ((mode === "draw-road" || mode === "draw-path") && edgeSource !== null) {
    clearEdgeSource(); return;
  }
  if (mode !== "add-node") return;
  createNewNode(e.latlng.lat, e.latlng.lng);
});

/* ══════════════════════════════════════════════
   NODE APPEARANCE
   ══════════════════════════════════════════════ */
function getNodeColor(id) {
  if (id in startIds) return C_START;
  if (id in endIds)   return C_END;
  if (id in deletedIds) return C_DELETED;
  if (id in loneIds) return C_DELETED;      // isolated nodes show red
  if (id in deadEndIds) return C_EDGE_MIX;  // dead-end nodes show orange
  if (id in includedIds) return C_GREEN;
  var n = getNodeData(id);
  if (!n) {
    // Created node — check if it's a split node
    for (var i = 0; i < createdNodes.length; i++) {
      if (createdNodes[i].id === id && createdNodes[i].split) return C_CYAN;
    }
    return getCreatedNodeColor(id);
  }
  if (!n.is_main) return C_SECONDARY;
  return C_MAIN;
}

function getCreatedNodeColor(id) {
  var hasRoad = false, hasPath = false;
  for (var i = 0; i < createdLines.length; i++) {
    var cl = createdLines[i];
    if (cl.from_id === id || cl.to_id === id) {
      if (cl.edgeType === "path") hasPath = true;
      else hasRoad = true;
    }
  }
  if (hasRoad) return C_CYAN;
  if (hasPath) return C_GREEN;
  return C_DELETED;  // no edges — red (isolated)
}

function getNodeBorder(id) {
  if (id in endIds)   return "#333";
  if (id in startIds) return "#fff";
  return "#fff";
}

function getNodeRadius(id) {
  if (id in startIds || id in endIds) return 9;
  if (id in deletedIds || id in includedIds) return 7;
  // Created nodes
  var n = getNodeData(id);
  if (!n) return 7;
  return 7;  // main nodes bumped from 5 → 7
}

function getNodeBorderWidth(id) {
  if (id in startIds || id in endIds) return 2.5;
  return 1;
}

function updateMarkerStyle(id) {
  var m = markerMap[id] || createdMarkers[id];
  if (m) {
    m.setStyle({
      fillColor: getNodeColor(id), color: getNodeBorder(id),
      weight: getNodeBorderWidth(id), radius: getNodeRadius(id)
    });
    // Re-apply draw-mode highlight if this node is the current edge source
    if (edgeSource === id) {
      m.setStyle({ color: getNodeColor(id), weight: 3, radius: getNodeRadius(id) + 3 });
    }
  }
}

function getNodeData(id) {
  if (typeof id === "number" && markerMap[id]) return markerMap[id]._nodeData;
  return null;
}

function getNodeStatus(id) {
  if (id in startIds) return "START";
  if (id in endIds)   return "END";
  if (id in deletedIds) return "DELETED";
  if (id in loneIds) return "ISOLATED";
  if (id in deadEndIds) return "dead-end";
  if (id in includedIds) return "INCLUDED";
  var n = getNodeData(id);
  if (n && !n.is_main) return "secondary";
  if (!n) return "created";
  return "main";
}

function isValidForStartEnd(id) {
  if (id in deletedIds) return false;
  var n = getNodeData(id);
  if (!n) return true; // created node
  if (n.is_main) return true;
  if (id in includedIds) return true;
  return false;
}

/* ══════════════════════════════════════════════
   EDGE APPEARANCE
   ══════════════════════════════════════════════ */
function getNodeEffectiveState(id) {
  if (id in deletedIds) return "deleted";
  if (id in loneIds) return "deleted";  // lone = effectively deleted
  if (id in startIds || id in endIds) return "main";  // start/end exempt from dead-end
  if (id in deadEndIds) return "dead-end";
  if (id in includedIds) return "green";
  var n = getNodeData(id);
  if (!n) return "green";
  if (n.is_main) return "main";
  return "secondary";
}

function updateEdgeStyle(key) {
  var info = edgeLineMap[key];
  if (!info) return;

  // Split-hidden edge: completely invisible (split sub-edges drawn on top)
  if (key in splitHiddenEdges) {
    info.line.setStyle({ opacity: 0, weight: 0 });
    info.hitbox.setStyle({ opacity: 0, weight: 0 });
    return;
  }
  // Restore hitbox if previously hidden by split
  info.hitbox.setStyle({ opacity: 0, weight: 18 });

  // Explicitly deleted edge always red dashed
  if (key in deletedEdges) {
    info.line.setStyle({ color: C_DELETED, opacity: 1.0, dashArray: "4 4", weight: 4 });
    return;
  }

  var uState = getNodeEffectiveState(info.u);
  var vState = getNodeEffectiveState(info.v);

  // Either endpoint deleted/lone → red (not part of active graph)
  if (uState === "deleted" || vState === "deleted") {
    info.line.setStyle({ color: C_DELETED, opacity: 1.0, dashArray: null, weight: 4 });
    return;
  }

  // Self-loop edges are always useless (discarded by solver) → orange
  if (info.u === info.v) {
    info.line.setStyle({ color: C_EDGE_MIX, opacity: 1.0, dashArray: null, weight: 4 });
    return;
  }

  // Either endpoint is dead-end → orange
  if (uState === "dead-end" || vState === "dead-end") {
    info.line.setStyle({ color: C_EDGE_MIX, opacity: 1.0, dashArray: null, weight: 4 });
    return;
  }

  // Either endpoint is green → green edge (but not if other is secondary)
  if ((uState === "green" || vState === "green") &&
      uState !== "secondary" && vState !== "secondary") {
    info.line.setStyle({ color: C_GREEN, opacity: 1.0, dashArray: null, weight: 4 });
    return;
  }

  // Both active main → blue
  if (uState === "main" && vState === "main") {
    info.line.setStyle({ color: C_EDGE_MAIN, opacity: 1.0, dashArray: null, weight: 4 });
    return;
  }

  // One active main/green, one secondary → orange
  if (uState === "main" || vState === "main" ||
      uState === "green" || vState === "green") {
    info.line.setStyle({ color: C_EDGE_MIX, opacity: 1.0, dashArray: null, weight: 4 });
    return;
  }

  // Both secondary → dim grey (they're only drawn after reveal)
  if (uState === "secondary" && vState === "secondary") {
    info.line.setStyle({ color: "#ccc", opacity: 0.5, weight: 2, dashArray: null });
    return;
  }

  // Fallback → red
  info.line.setStyle({ color: C_DELETED, opacity: 1.0, dashArray: null, weight: 4 });
}

function refreshAllEdges() {
  refreshLoneNodes();
  Object.keys(edgeLineMap).forEach(updateEdgeStyle);
  refreshCreatedEdgeStyles();
  // Refresh all created node colors (edge-dependent)
  createdNodes.forEach(function(cn) { updateMarkerStyle(cn.id); });
}

function refreshCreatedEdgeStyles() {
  createdLines.forEach(function(cl) {
    var fromState = getNodeEffectiveState(cl.from_id);
    var toState = getNodeEffectiveState(cl.to_id);
    var baseColor = cl.split ? C_CYAN : (cl.edgeType === "path" ? C_GREEN : C_CYAN);

    if (fromState === "deleted" || toState === "deleted") {
      cl.line.setStyle({ color: C_DELETED, opacity: 1.0, dashArray: "6 4", weight: 4 });
    } else if (fromState === "dead-end" || toState === "dead-end") {
      cl.line.setStyle({ color: C_EDGE_MIX, opacity: 1.0, dashArray: "6 4", weight: 4 });
    } else {
      cl.line.setStyle({ color: baseColor, opacity: 1.0, dashArray: "6 4", weight: 4 });
    }
  });
}

function revealSecondaryEdges(id) {
  // Lazily draw sec-sec edges connected to id (only called when a sec node is included)
  Object.keys(secEdgeData).forEach(function(key) {
    if (key in edgeLineMap) return;  // already drawn
    var sec = secEdgeData[key];
    if (sec.u !== id && sec.v !== id) return;
    var line   = L.polyline(sec.coords, { color: "#ccc", weight: 2, opacity: 0.5 }).addTo(map);
    var hitbox = L.polyline(sec.coords, { color: C_EDGE_MIX, weight: 18, opacity: 0  }).addTo(map);
    edgeLineMap[key] = { line: line, hitbox: hitbox, u: sec.u, v: sec.v, bothMain: false, coords: sec.coords };
    line.on("click",   function(ev) { onEdgeClick(key, ev.latlng); });
    hitbox.on("click", function(ev) { onEdgeClick(key, ev.latlng); });
  });
}

// Track nodes that are visually lone (auto-red) or dead-ends (orange)
var loneIds    = {};
var deadEndIds = {};

function getEffectiveDegree(id) {
  // Count valid edges: non-deleted, non-loop, other endpoint not deleted/lone
  var deg = 0;
  Object.keys(edgeLineMap).forEach(function(key) {
    if (key in deletedEdges) return;
    var info = edgeLineMap[key];
    var other = null;
    if (info.u === id) other = info.v;
    else if (info.v === id) other = info.u;
    if (other === null) return;
    if (other === id) return;  // skip self-loops
    if (other in deletedIds) return;
    deg++;
  });
  // Count created edges (same rules: skip self-loops and deleted endpoints)
  createdLines.forEach(function(cl) {
    var other = null;
    if (cl.from_id === id) other = cl.to_id;
    else if (cl.to_id === id) other = cl.from_id;
    if (other === null) return;
    if (other === id) return;  // skip self-loops
    if (other in deletedIds) return;
    deg++;
  });
  return deg;
}

function refreshLoneNodes() {
  // Recompute lone (degree 0) and dead-end (degree 1) sets for all active nodes
  var prevLone    = loneIds;
  var prevDeadEnd = deadEndIds;
  loneIds    = {};
  deadEndIds = {};

  NODES.forEach(function(n) {
    if (!n.is_main) return;
    if (n.id in deletedIds) return;
    if (n.id in startIds || n.id in endIds) return;  // start/end exempt
    var deg = getEffectiveDegree(n.id);
    if (deg === 0) {
      loneIds[n.id] = true;
    } else if (deg === 1) {
      deadEndIds[n.id] = true;
    }
  });

  // Also evaluate created nodes (green & purple)
  createdNodes.forEach(function(cn) {
    if (cn.id in startIds || cn.id in endIds) return;  // start/end exempt
    var deg = getEffectiveDegree(cn.id);
    if (deg === 0) {
      loneIds[cn.id] = true;
    } else if (deg === 1) {
      deadEndIds[cn.id] = true;
    }
  });

  // Update markers for any node whose visual category changed
  var changed = {};
  Object.keys(prevLone).forEach(function(id) { changed[id] = true; });
  Object.keys(loneIds).forEach(function(id) { changed[id] = true; });
  Object.keys(prevDeadEnd).forEach(function(id) { changed[id] = true; });
  Object.keys(deadEndIds).forEach(function(id) { changed[id] = true; });
  Object.keys(changed).forEach(function(id) {
    // Created node ids are strings ("new_X"), original node ids are numeric
    var nodeId = (typeof id === "string" && id.indexOf("new_") === 0) ? id : Number(id);
    updateMarkerStyle(nodeId);
  });
}

/* ══════════════════════════════════════════════
   MODE
   ══════════════════════════════════════════════ */
var HINTS = {
  "delete":    "<b>Click a node</b> to delete/restore it (<span style='color:#f00'>red</span>). <b>Click an edge</b> to delete/restore it.",
  "add-node":  "<b>Click empty space</b> to place a <span style='color:#0cc'>cyan</span> node. <b>Click a grey node</b> to include it.",
  "draw-road": "<b>Click two nodes</b> to draw a <span style='color:#0cc'>cyan road</span> edge between them.",
  "draw-path": "<b>Click two nodes</b> to draw a <span style='color:#080'>green path</span> edge (zero distance).",
  "split":     "<b>Click an edge</b> to <span style='color:#0cc'>split</span> it at the nearest point, inserting a new node.",
  "start":     "<b>Click</b> main/included nodes to toggle them as <b>START</b> (●). Multiple allowed.",
  "end":       "<b>Click</b> main/included nodes to toggle them as <b>END</b> (○). Multiple allowed."
};

function setMode(m) {
  mode = m;
  window._markerClickFlag = false;
  clearEdgeSource();
  var modes = ["delete", "add-node", "draw-road", "draw-path", "split", "start", "end"];
  modes.forEach(function(b) {
    var el = document.getElementById("btn-" + b);
    if (el) el.className = "mode-btn" + (b === m ? " active-" + b : "");
  });
  document.getElementById("mode-hint").innerHTML = HINTS[m];
  map.getContainer().style.cursor = (m === "add-node" || m === "draw-road" || m === "draw-path" || m === "split") ? "crosshair" : "";
}
setMode("delete");

/* ══════════════════════════════════════════════
   UNDO
   ══════════════════════════════════════════════ */
function pushUndo(action) {
  undoStack.push(action);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];  // new user action clears redo history
}

document.addEventListener("keydown", function(e) {
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === "z" || e.key === "Z")) {
    e.preventDefault();
    doRedo();
  } else if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === "z") {
    e.preventDefault();
    doUndo();
  }
});

function doUndo() {
  if (!undoStack.length) return;
  var a = undoStack.pop();
  var redoAction = a;  // default: same action re-pushed for redo

  if (a.type === "delete-node") {
    delete deletedIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
  } else if (a.type === "restore-node") {
    deletedIds[a.id] = true;
    updateMarkerStyle(a.id);
    refreshAllEdges();
  } else if (a.type === "delete-edge") {
    delete deletedEdges[a.key];
    updateEdgeStyle(a.key);
  } else if (a.type === "restore-edge") {
    deletedEdges[a.key] = true;
    updateEdgeStyle(a.key);
  } else if (a.type === "include") {
    delete includedIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
  } else if (a.type === "uninclude") {
    includedIds[a.id] = true;
    updateMarkerStyle(a.id);
    refreshAllEdges();
  } else if (a.type === "add-start") {
    delete startIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
  } else if (a.type === "remove-start") {
    startIds[a.id] = true;
    updateMarkerStyle(a.id);
    refreshAllEdges();
  } else if (a.type === "add-end") {
    delete endIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
  } else if (a.type === "remove-end") {
    endIds[a.id] = true;
    updateMarkerStyle(a.id);
    refreshAllEdges();
  } else if (a.type === "create-node") {
    // Capture node data before removing so redo can re-create it
    var nodeData = null;
    for (var i = 0; i < createdNodes.length; i++) {
      if (createdNodes[i].id === a.id) { nodeData = createdNodes[i]; break; }
    }
    redoAction = { type: "create-node", id: a.id, nodeData: nodeData };
    removeCreatedNodeNoUndo(a.id);
  } else if (a.type === "create-edge") {
    // Search from end for the matching edge (don't assume it's last)
    for (var i = createdLines.length - 1; i >= 0; i--) {
      if (createdLines[i].from_id === a.from_id && createdLines[i].to_id === a.to_id) {
        map.removeLayer(createdLines[i].line);
        if (createdLines[i].hitbox) map.removeLayer(createdLines[i].hitbox);
        createdEdges.splice(i, 1);
        createdLines.splice(i, 1);
        break;
      }
    }
    refreshAllEdges();
  } else if (a.type === "delete-created-edge") {
    // Restore the deleted edge
    addCreatedEdgeNoUndo(a.from_id, a.to_id, { edgeType: a.edgeType });
    refreshAllEdges();
  } else if (a.type === "remove-created-node") {
    // Re-create the node
    _recreateNode(a.nodeData, a.edgeData);
    refreshAllEdges();
  } else if (a.type === "split") {
    // Remove sub-edges + split node, restore original edge
    removeCreatedNodeNoUndo(a.newId);
    delete deletedEdges[a.key];
    delete splitHiddenEdges[a.key];
    refreshAllEdges();
  } else if (a.type === "split-created") {
    // Remove sub-edges + split node, restore original created edge
    removeCreatedNodeNoUndo(a.newId);
    addCreatedEdgeNoUndo(a.fromId, a.toId, { split: a.wasSplit, coords: a.oldCoords, edgeType: a.edgeType });
    refreshAllEdges();
  }

  redoStack.push(redoAction);
  refreshStats();
}

function doRedo() {
  if (!redoStack.length) return;
  var a = redoStack.pop();

  if (a.type === "delete-node") {
    deletedIds[a.id] = true;
    if (a.id in startIds) delete startIds[a.id];
    if (a.id in endIds) delete endIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "restore-node") {
    delete deletedIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "delete-edge") {
    deletedEdges[a.key] = true;
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "restore-edge") {
    delete deletedEdges[a.key];
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "include") {
    includedIds[a.id] = true;
    updateMarkerStyle(a.id);
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "uninclude") {
    delete includedIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "add-start") {
    startIds[a.id] = true;
    updateMarkerStyle(a.id);
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "remove-start") {
    delete startIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "add-end") {
    endIds[a.id] = true;
    updateMarkerStyle(a.id);
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "remove-end") {
    delete endIds[a.id];
    updateMarkerStyle(a.id);
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "create-node") {
    // Re-create the node (nodeData was captured at undo time)
    if (a.nodeData) _recreateNode(a.nodeData, []);
    undoStack.push({ type: "create-node", id: a.id });
  } else if (a.type === "create-edge") {
    addCreatedEdgeNoUndo(a.from_id, a.to_id, { edgeType: a.edgeType });
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "delete-created-edge") {
    // Re-delete: find and remove the edge
    for (var i = 0; i < createdLines.length; i++) {
      if (createdLines[i].from_id === a.from_id && createdLines[i].to_id === a.to_id) {
        map.removeLayer(createdLines[i].line);
        if (createdLines[i].hitbox) map.removeLayer(createdLines[i].hitbox);
        createdEdges.splice(i, 1);
        createdLines.splice(i, 1);
        break;
      }
    }
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "remove-created-node") {
    removeCreatedNodeNoUndo(a.id);
    undoStack.push(a);
  } else if (a.type === "split") {
    // Re-apply split: hide original edge, recreate node + sub-edges
    deletedEdges[a.key] = true;
    splitHiddenEdges[a.key] = true;
    createdNodes.push(a.nodeData);
    var sm = L.circleMarker([a.nodeData.lat, a.nodeData.lon], {
      radius: 7, fillColor: C_CYAN, color: "#fff", weight: 1.5, fillOpacity: 1.0, pane: 'nodePane'
    }).addTo(map);
    sm.bindTooltip(a.newId, { permanent: false, direction: "top", offset: [0, -6], className: "node-label" });
    (function(nid, nd) {
      sm.on("click", function() { onNodeClick(nid); });
      sm.on("mouseover", function() {
        document.getElementById("node-info").textContent =
          "Split node " + nid + " | lat: " + nd.lat.toFixed(5) + " lon: " + nd.lon.toFixed(5);
      });
    })(a.newId, a.nodeData);
    createdMarkers[a.newId] = sm;
    addCreatedEdgeNoUndo(a.u, a.newId, { split: true, coords: a.coordsBefore, edgeType: "road" });
    addCreatedEdgeNoUndo(a.newId, a.v, { split: true, coords: a.coordsAfter, edgeType: "road" });
    refreshAllEdges();
    undoStack.push(a);
  } else if (a.type === "split-created") {
    // Re-apply split on created edge: remove restored edge, recreate split node + sub-edges
    for (var i = createdLines.length - 1; i >= 0; i--) {
      if (createdLines[i].from_id === a.fromId && createdLines[i].to_id === a.toId) {
        map.removeLayer(createdLines[i].line);
        if (createdLines[i].hitbox) map.removeLayer(createdLines[i].hitbox);
        createdEdges.splice(i, 1);
        createdLines.splice(i, 1);
        break;
      }
    }
    createdNodes.push(a.nodeData);
    var sm = L.circleMarker([a.nodeData.lat, a.nodeData.lon], {
      radius: 7, fillColor: C_CYAN, color: "#fff", weight: 1.5, fillOpacity: 1.0, pane: 'nodePane'
    }).addTo(map);
    sm.bindTooltip(a.newId, { permanent: false, direction: "top", offset: [0, -6], className: "node-label" });
    (function(nid, nd) {
      sm.on("click", function() { onNodeClick(nid); });
      sm.on("mouseover", function() {
        document.getElementById("node-info").textContent =
          "Split node " + nid + " | lat: " + nd.lat.toFixed(5) + " lon: " + nd.lon.toFixed(5);
      });
    })(a.newId, a.nodeData);
    createdMarkers[a.newId] = sm;
    addCreatedEdgeNoUndo(a.fromId, a.newId, { split: true, coords: a.coordsBefore, edgeType: a.edgeType });
    addCreatedEdgeNoUndo(a.newId, a.toId, { split: true, coords: a.coordsAfter, edgeType: a.edgeType });
    refreshAllEdges();
    undoStack.push(a);
  }

  refreshStats();
}

/* ══════════════════════════════════════════════
   CLICK HANDLERS
   ══════════════════════════════════════════════ */
function onNodeClick(id) {
  window._markerClickFlag = true;
  if (mode === "delete")    handleDelete(id);
  else if (mode === "add-node")  handleAddNode(id);
  else if (mode === "draw-road" || mode === "draw-path") handleDrawEdge(id);
  else if (mode === "start") handleStart(id);
  else if (mode === "end")   handleEnd(id);
  refreshStats();
}

function onEdgeClick(key, latlng) {
  if (mode === "delete") {
    toggleDeletedEdge(key);
    refreshStats();
  } else if (mode === "split" && latlng) {
    splitEdge(key, latlng);
    refreshStats();
  }
}

/* ── DELETE ── */
function handleDelete(id) {
  // Created node? remove it entirely
  if (typeof id === "string" && id.startsWith("new_")) {
    removeCreatedNode(id);
    return;
  }
  var n = getNodeData(id);
  if (!n || !n.is_main) return;

  if (id in deletedIds) {
    delete deletedIds[id];
    pushUndo({ type: "restore-node", id: id });
  } else {
    deletedIds[id] = true;
    // Remove from start/end if present
    if (id in startIds) { delete startIds[id]; }
    if (id in endIds)   { delete endIds[id]; }
    pushUndo({ type: "delete-node", id: id });
  }
  updateMarkerStyle(id);
  refreshAllEdges();
}

function toggleDeletedEdge(key) {
  if (!(key in edgeLineMap)) return;
  if (key in deletedEdges) {
    delete deletedEdges[key];
    pushUndo({ type: "restore-edge", key: key });
  } else {
    deletedEdges[key] = true;
    pushUndo({ type: "delete-edge", key: key });
  }
  refreshAllEdges();
}

/* ── ADD NODE (include secondary nodes; map click creates new nodes) ── */
function handleAddNode(id) {
  var n = getNodeData(id);
  if (n && !n.is_main) {
    // Toggle include for secondary (grey) nodes
    if (id in includedIds) {
      delete includedIds[id];
      pushUndo({ type: "uninclude", id: id });
    } else {
      includedIds[id] = true;
      revealSecondaryEdges(id);  // lazily draw sec-sec edges touching this node
      pushUndo({ type: "include", id: id });
    }
    updateMarkerStyle(id);
    refreshAllEdges();
  }
  // Clicking a main or created node in add-node mode does nothing
}

/* ── DRAW ROAD / DRAW PATH (click two nodes to connect them) ── */
function handleDrawEdge(id) {
  var edgeType = (mode === "draw-path") ? "path" : "road";
  var modeColor = (edgeType === "path") ? "#080" : "#0cc";
  var bar = document.getElementById("selection-bar");
  if (edgeSource === null) {
    edgeSource = id;
    highlightEdgeSource(id, true);
    bar.className = "selection-bar visible";
    bar.textContent = "Edge from: " + id + " → click another node";
    bar.style.background = modeColor;
    bar.style.color = (edgeType === "path") ? "#fff" : "#000";
    bar.style.borderColor = modeColor;
  } else {
    if (edgeSource === id) {
      clearEdgeSource();
    } else {
      addCreatedEdge(edgeSource, id, edgeType);
      // Advance selection to the target node
      highlightEdgeSource(edgeSource, false);
      edgeSource = id;
      highlightEdgeSource(id, true);
      bar.textContent = "Edge from: " + id + " → click another node (click source to deselect)";
      bar.style.background = modeColor;
      bar.style.color = (edgeType === "path") ? "#fff" : "#000";
      bar.style.borderColor = modeColor;
    }
  }
}

function highlightEdgeSource(id, on) {
  var m = markerMap[id] || createdMarkers[id];
  if (m) {
    if (on) {
      m.setStyle({ color: getNodeColor(id), weight: 3, radius: getNodeRadius(id) + 3 });
    } else {
      m.setStyle({ color: getNodeBorder(id), weight: getNodeBorderWidth(id), radius: getNodeRadius(id) });
    }
  }
}

function clearEdgeSource() {
  if (edgeSource !== null) highlightEdgeSource(edgeSource, false);
  edgeSource = null;
  var bar = document.getElementById("selection-bar");
  bar.className = "selection-bar";
  bar.style.background = "";
  bar.style.color = "";
  bar.style.borderColor = "";
}

/* ── START (multi) ── */
function handleStart(id) {
  if (!isValidForStartEnd(id)) return;

  // If it's currently an end, remove from end first
  if (id in endIds) {
    delete endIds[id];
  }

  if (id in startIds) {
    delete startIds[id];
    pushUndo({ type: "remove-start", id: id });
  } else {
    startIds[id] = true;
    pushUndo({ type: "add-start", id: id });
  }
  updateMarkerStyle(id);
  refreshAllEdges();
}

/* ── END (multi) ── */
function handleEnd(id) {
  if (!isValidForStartEnd(id)) return;

  if (id in startIds) {
    delete startIds[id];
  }

  if (id in endIds) {
    delete endIds[id];
    pushUndo({ type: "remove-end", id: id });
  } else {
    endIds[id] = true;
    pushUndo({ type: "add-end", id: id });
  }
  updateMarkerStyle(id);
  refreshAllEdges();
}

/* ══════════════════════════════════════════════
   CREATED NODES & EDGES
   ══════════════════════════════════════════════ */
function flashWarning(msg) {
  var el = document.getElementById("node-info");
  var prev = el.textContent;
  el.style.color = "#f00";
  el.textContent = "⚠ " + msg;
  setTimeout(function() { el.style.color = ""; el.textContent = prev; }, 1500);
}

function createNewNode(lat, lon) {
  // Reject placement within 5 m of any existing node
  var MIN_DIST = 5;
  for (var i = 0; i < NODES.length; i++) {
    if (haversine(lat, lon, NODES[i].lat, NODES[i].lon) < MIN_DIST) {
      flashWarning("Too close to existing node " + NODES[i].id); return;
    }
  }
  for (var i = 0; i < createdNodes.length; i++) {
    if (haversine(lat, lon, createdNodes[i].lat, createdNodes[i].lon) < MIN_DIST) {
      flashWarning("Too close to created node " + createdNodes[i].id); return;
    }
  }

  var id = "new_" + nextNewId;
  nextNewId++;
  createdNodes.push({ id: id, lat: lat, lon: lon });

  var marker = L.circleMarker([lat, lon], {
    radius: 7, fillColor: C_DELETED, color: "#fff", weight: 1.5, fillOpacity: 1.0, pane: 'nodePane'
  }).addTo(map);
  marker.bindTooltip(id, { permanent: false, direction: "top", offset: [0, -6], className: "node-label" });
  marker.on("click", function() { onNodeClick(id); });
  marker.on("mouseover", function() {
    document.getElementById("node-info").textContent =
      "Created node " + id + " | lat: " + lat.toFixed(5) + " lon: " + lon.toFixed(5);
  });
  createdMarkers[id] = marker;
  pushUndo({ type: "create-node", id: id });
  refreshStats();
}

function removeCreatedNode(id) {
  // Save data for undo
  var nodeData = null;
  for (var i = 0; i < createdNodes.length; i++) {
    if (createdNodes[i].id === id) { nodeData = createdNodes[i]; break; }
  }
  var edgeData = [];
  createdLines.forEach(function(cl) {
    if (cl.from_id === id || cl.to_id === id) {
      edgeData.push({ from_id: cl.from_id, to_id: cl.to_id, edgeType: cl.edgeType });
    }
  });
  pushUndo({ type: "remove-created-node", id: id, nodeData: nodeData, edgeData: edgeData });
  removeCreatedNodeNoUndo(id);
  refreshStats();
}

function removeCreatedNodeNoUndo(id) {
  if (createdMarkers[id]) { map.removeLayer(createdMarkers[id]); delete createdMarkers[id]; }
  createdNodes = createdNodes.filter(function(n) { return n.id !== id; });
  var toRemove = [];
  createdLines.forEach(function(cl, idx) {
    if (cl.from_id === id || cl.to_id === id) {
      map.removeLayer(cl.line);
      if (cl.hitbox) map.removeLayer(cl.hitbox);
      toRemove.push(idx);
    }
  });
  for (var i = toRemove.length - 1; i >= 0; i--) {
    createdEdges.splice(toRemove[i], 1);
    createdLines.splice(toRemove[i], 1);
  }
  if (id in startIds) delete startIds[id];
  if (id in endIds) delete endIds[id];
  refreshAllEdges();
}

function _recreateNode(nodeData, edgeData) {
  if (!nodeData) return;
  createdNodes.push(nodeData);
  var marker = L.circleMarker([nodeData.lat, nodeData.lon], {
    radius: 7, fillColor: C_CYAN, color: "#fff", weight: 1.5, fillOpacity: 1.0, pane: 'nodePane'
  }).addTo(map);
  marker.bindTooltip(nodeData.id, { permanent: false, direction: "top", offset: [0, -6], className: "node-label" });
  marker.on("click", function() { onNodeClick(nodeData.id); });
  marker.on("mouseover", function() {
    document.getElementById("node-info").textContent =
      "Created node " + nodeData.id + " | lat: " + nodeData.lat.toFixed(5) + " lon: " + nodeData.lon.toFixed(5);
  });
  createdMarkers[nodeData.id] = marker;
  // Recreate edges
  edgeData.forEach(function(ed) { addCreatedEdgeNoUndo(ed.from_id, ed.to_id, { edgeType: ed.edgeType }); });
}

function getNodeLatLon(id) {
  if (typeof id === "number" && markerMap[id]) {
    var n = markerMap[id]._nodeData;
    return [n.lat, n.lon];
  }
  if (typeof id === "string") {
    for (var i = 0; i < createdNodes.length; i++) {
      if (createdNodes[i].id === id) return [createdNodes[i].lat, createdNodes[i].lon];
    }
  }
  return null;
}

function addCreatedEdge(fromId, toId, edgeType) {
  edgeType = edgeType || "road";
  addCreatedEdgeNoUndo(fromId, toId, { edgeType: edgeType });
  pushUndo({ type: "create-edge", from_id: fromId, to_id: toId, edgeType: edgeType });
  refreshAllEdges();  // endpoints may no longer be isolated
  refreshStats();
}

function addCreatedEdgeNoUndo(fromId, toId, opts) {
  opts = opts || {};
  var a = getNodeLatLon(fromId);
  var b = getNodeLatLon(toId);
  if (!a || !b) return;
  var coords = opts.coords || [a, b];
  var edgeType = opts.edgeType || "road";
  var color  = opts.split ? C_CYAN : (edgeType === "path" ? C_GREEN : C_CYAN);
  var line   = L.polyline(coords, { color: color, weight: 4,  opacity: 1.0, dashArray: "6 4" }).addTo(map);
  var hitbox = L.polyline(coords, { color: color, weight: 18, opacity: 0   }).addTo(map);
  var cl = { line: line, hitbox: hitbox, from_id: fromId, to_id: toId, split: opts.split, edgeType: edgeType, coords: coords };
  createdEdges.push({ from_id: fromId, to_id: toId, edgeType: edgeType });
  createdLines.push(cl);
  line.on("click",   function(ev) { L.DomEvent.stopPropagation(ev); onCreatedEdgeClick(cl, ev.latlng); });
  hitbox.on("click", function(ev) { L.DomEvent.stopPropagation(ev); onCreatedEdgeClick(cl, ev.latlng); });
}

function onCreatedEdgeClick(cl, latlng) {
  if (mode === "delete") {
    deleteCreatedEdge(cl);
    refreshStats();
  } else if (mode === "split" && latlng) {
    splitCreatedEdge(cl, latlng);
    refreshStats();
  }
}

function deleteCreatedEdge(cl) {
  map.removeLayer(cl.line);
  if (cl.hitbox) map.removeLayer(cl.hitbox);
  var idx = createdLines.indexOf(cl);
  if (idx >= 0) {
    createdEdges.splice(idx, 1);
    createdLines.splice(idx, 1);
  }
  pushUndo({ type: "delete-created-edge", from_id: cl.from_id, to_id: cl.to_id, edgeType: cl.edgeType });
  refreshAllEdges();
}

/* ══════════════════════════════════════════════
   SPLIT
   ══════════════════════════════════════════════ */
function closestPointOnSegment(px, py, ax, ay, bx, by) {
  var dx = bx - ax, dy = by - ay;
  var lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return { x: ax, y: ay, t: 0 };
  var t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  return { x: ax + t * dx, y: ay + t * dy, t: t };
}

function closestPointOnPolyline(latlng, coords) {
  // coords: array of [lat, lon]
  var px = latlng.lng, py = latlng.lat;
  var bestDist = Infinity, bestPt = null, bestSegIdx = 0;
  for (var i = 0; i < coords.length - 1; i++) {
    var a = coords[i], b = coords[i + 1];
    var cp = closestPointOnSegment(px, py, a[1], a[0], b[1], b[0]);
    var dx = cp.x - px, dy = cp.y - py;
    var dist = dx * dx + dy * dy;
    if (dist < bestDist) {
      bestDist = dist;
      bestPt = [cp.y, cp.x];  // [lat, lon]
      bestSegIdx = i;
    }
  }
  return { pt: bestPt, segIdx: bestSegIdx };
}

function splitEdge(key, latlng) {
  var info = edgeLineMap[key];
  if (!info) return;
  if (key in deletedEdges) { flashWarning("Cannot split a deleted edge"); return; }

  var coords = info.coords;
  var result = closestPointOnPolyline(latlng, coords);
  if (!result.pt) return;

  var lat = result.pt[0], lon = result.pt[1];
  var MIN_DIST = 5;
  for (var i = 0; i < NODES.length; i++) {
    if (haversine(lat, lon, NODES[i].lat, NODES[i].lon) < MIN_DIST) {
      flashWarning("Split point too close to existing node " + NODES[i].id); return;
    }
  }
  for (var i = 0; i < createdNodes.length; i++) {
    if (haversine(lat, lon, createdNodes[i].lat, createdNodes[i].lon) < MIN_DIST) {
      flashWarning("Split point too close to created node " + createdNodes[i].id); return;
    }
  }

  var newId = "new_" + nextNewId;
  nextNewId++;

  var coordsBefore = coords.slice(0, result.segIdx + 1).concat([result.pt]);
  var coordsAfter  = [result.pt].concat(coords.slice(result.segIdx + 1));

  // Mark original edge hidden (split edges replace it visually)
  deletedEdges[key] = true;
  splitHiddenEdges[key] = true;
  updateEdgeStyle(key);

  // Create split node
  var nodeData = { id: newId, lat: lat, lon: lon, split: true };
  createdNodes.push(nodeData);
  var marker = L.circleMarker([lat, lon], {
    radius: 7, fillColor: C_CYAN, color: "#fff", weight: 1.5, fillOpacity: 1.0, pane: 'nodePane'
  }).addTo(map);
  marker.bindTooltip(newId, { permanent: false, direction: "top", offset: [0, -6], className: "node-label" });
  marker.on("click", function() { onNodeClick(newId); });
  marker.on("mouseover", function() {
    document.getElementById("node-info").textContent =
      "Split node " + newId + " | lat: " + lat.toFixed(5) + " lon: " + lon.toFixed(5);
  });
  createdMarkers[newId] = marker;

  // Add two sub-edges
  addCreatedEdgeNoUndo(info.u, newId, { split: true, coords: coordsBefore, edgeType: "road" });
  addCreatedEdgeNoUndo(newId, info.v, { split: true, coords: coordsAfter, edgeType: "road" });


  pushUndo({
    type: "split",
    key: key,
    newId: newId,
    nodeData: nodeData,
    u: info.u,
    v: info.v,
    coordsBefore: coordsBefore,
    coordsAfter: coordsAfter
  });
  refreshAllEdges();
}

function splitCreatedEdge(cl, latlng) {
  var coords = cl.coords || [getNodeLatLon(cl.from_id), getNodeLatLon(cl.to_id)];
  var result = closestPointOnPolyline(latlng, coords);
  if (!result.pt) return;

  var lat = result.pt[0], lon = result.pt[1];
  var MIN_DIST = 5;
  for (var i = 0; i < NODES.length; i++) {
    if (haversine(lat, lon, NODES[i].lat, NODES[i].lon) < MIN_DIST) {
      flashWarning("Split point too close to existing node " + NODES[i].id); return;
    }
  }
  for (var i = 0; i < createdNodes.length; i++) {
    if (haversine(lat, lon, createdNodes[i].lat, createdNodes[i].lon) < MIN_DIST) {
      flashWarning("Split point too close to created node " + createdNodes[i].id); return;
    }
  }

  var newId = "new_" + nextNewId;
  nextNewId++;

  var coordsBefore = coords.slice(0, result.segIdx + 1).concat([result.pt]);
  var coordsAfter  = [result.pt].concat(coords.slice(result.segIdx + 1));

  // Save original edge info before removal
  var fromId = cl.from_id;
  var toId = cl.to_id;
  var wasSplit = cl.split;
  var oldCoords = cl.coords;
  var oldEdgeType = cl.edgeType;

  // Remove the original created edge
  map.removeLayer(cl.line);
  if (cl.hitbox) map.removeLayer(cl.hitbox);
  var idx = createdLines.indexOf(cl);
  if (idx >= 0) {
    createdEdges.splice(idx, 1);
    createdLines.splice(idx, 1);
  }

  // Create split node
  var nodeData = { id: newId, lat: lat, lon: lon, split: true };
  createdNodes.push(nodeData);
  var marker = L.circleMarker([lat, lon], {
    radius: 7, fillColor: C_CYAN, color: "#fff", weight: 1.5, fillOpacity: 1.0, pane: 'nodePane'
  }).addTo(map);
  marker.bindTooltip(newId, { permanent: false, direction: "top", offset: [0, -6], className: "node-label" });
  marker.on("click", function() { onNodeClick(newId); });
  marker.on("mouseover", function() {
    document.getElementById("node-info").textContent =
      "Split node " + newId + " | lat: " + lat.toFixed(5) + " lon: " + lon.toFixed(5);
  });
  createdMarkers[newId] = marker;

  // Add two sub-edges
  addCreatedEdgeNoUndo(fromId, newId, { split: true, coords: coordsBefore, edgeType: oldEdgeType });
  addCreatedEdgeNoUndo(newId, toId, { split: true, coords: coordsAfter, edgeType: oldEdgeType });


  pushUndo({
    type: "split-created",
    newId: newId,
    nodeData: nodeData,
    fromId: fromId,
    toId: toId,
    wasSplit: wasSplit,
    oldCoords: oldCoords,
    edgeType: oldEdgeType,
    coordsBefore: coordsBefore,
    coordsAfter: coordsAfter
  });
  refreshAllEdges();
}

/* ══════════════════════════════════════════════
   STATS
   ══════════════════════════════════════════════ */
function refreshStats() {
  var nDelN = Object.keys(deletedIds).length;
  var nDelE = Object.keys(deletedEdges).length;
  var nCre  = createdNodes.length;
  var nEdg  = createdEdges.length;
  var nInc  = Object.keys(includedIds).length;
  var nSt   = Object.keys(startIds).length;
  var nEn   = Object.keys(endIds).length;

  var html = "";
  html += '<span class="c-del num">' + nDelN + '</span> deleted nodes, ';
  html += '<span class="c-del num">' + nDelE + '</span> deleted edges<br>';
  html += '<span class="c-grn num">' + nCre + '</span> created nodes, ';
  html += '<span class="c-grn num">' + nEdg + '</span> created edges, ';
  html += '<span class="c-grn num">' + nInc + '</span> included<br>';
  html += 'Start: <span class="c-blk num">' + (nSt ? nSt + " nodes" : "—") + '</span> · ';
  html += 'End: <span class="c-blk num">' + (nEn ? nEn + " nodes" : "—") + '</span>';

  document.getElementById("stats").innerHTML = html;
}
refreshStats();

/* ══════════════════════════════════════════════
   EXPORT
   ══════════════════════════════════════════════ */
function doExport() {
  var edgesWithLength = createdEdges.map(function(e, i) {
    var edgeType = e.edgeType || "road";
    var cl = createdLines[i];
    var coords = cl ? cl.coords : null;
    var length;
    if (edgeType === "path") {
      length = 0;
    } else if (coords && coords.length > 2) {
      length = polylineLength(coords);
    } else {
      var a = getNodeLatLon(e.from_id);
      var b = getNodeLatLon(e.to_id);
      length = (a && b) ? haversine(a[0], a[1], b[0], b[1]) : 0;
    }
    var out = { from_id: e.from_id, to_id: e.to_id, length: Math.round(length * 100) / 100, type: edgeType };
    if (coords && coords.length > 2) out.coords = coords;
    return out;
  });

  var createdNodesOut = createdNodes.map(function(n) {
    return { id: parseInt(n.id.replace("new_", "")), lat: n.lat, lon: n.lon };
  });

  var deletedEdgesOut = Object.keys(deletedEdges).map(function(key) {
    var parts = key.split("_");
    var uv = parts[0].split("-");
    return { u: parseInt(uv[0]), v: parseInt(uv[1]), idx: parseInt(parts[1]) };
  });

  var payload = {
    deleted_ids:   Object.keys(deletedIds).map(Number).sort(function(a,b){return a-b;}),
    deleted_edges: deletedEdgesOut,
    created_nodes: createdNodesOut,
    created_edges: edgesWithLength,
    included_ids:  Object.keys(includedIds).map(Number).sort(function(a,b){return a-b;}),
    start_ids:     Object.keys(startIds).map(function(x){ return isNaN(x) ? x : Number(x); }),
    end_ids:       Object.keys(endIds).map(function(x){ return isNaN(x) ? x : Number(x); }),
    split_hidden_edges: Object.keys(splitHiddenEdges)
  };

  var json = JSON.stringify(payload, null, 2);
  var blob = new Blob([json], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = SLUG + "_edits.json";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);

  var btn = document.getElementById("export-btn");
  btn.textContent = "✓ Exported!"; btn.classList.add("exported");
  setTimeout(function() { btn.textContent = "⬇ Export"; btn.classList.remove("exported"); }, 2000);
}

/* ══════════════════════════════════════════════
   IMPORT
   ══════════════════════════════════════════════ */
function doImport() {
  document.getElementById("import-file").click();
}

function handleImportFile(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      applyImport(data);
      var btn = document.getElementById("import-btn");
      btn.textContent = "✓ Imported!";
      setTimeout(function() { btn.textContent = "⬆ Import"; }, 2000);
    } catch (err) {
      alert("Invalid JSON file: " + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = ""; // reset so same file can be re-imported
}

function applyImport(data) {
  // Reset all state
  deletedIds = {};
  deletedEdges = {};
  splitHiddenEdges = {};
  includedIds = {};
  startIds = {};
  endIds = {};
  undoStack = [];
  redoStack = [];

  // Remove all created nodes/edges
  Object.keys(createdMarkers).forEach(function(id) {
    map.removeLayer(createdMarkers[id]);
  });
  createdMarkers = {};
  createdLines.forEach(function(cl) { map.removeLayer(cl.line); });
  createdLines = [];
  createdNodes = [];
  createdEdges = [];

  // Apply deleted nodes
  (data.deleted_ids || []).forEach(function(id) {
    deletedIds[id] = true;
  });

  // Apply deleted edges
  (data.deleted_edges || []).forEach(function(de) {
    if ('idx' in de) {
      var key = Math.min(de.u, de.v) + "-" + Math.max(de.u, de.v) + "_" + de.idx;
      if (key in edgeLineMap) deletedEdges[key] = true;
    } else {
      // Backward compat: old format without idx → delete all edges between pair
      var base = Math.min(de.u, de.v) + "-" + Math.max(de.u, de.v);
      Object.keys(edgeLineMap).forEach(function(k) {
        if (k.split("_")[0] === base) deletedEdges[k] = true;
      });
    }
  });

  // Apply included nodes (also reveal their sec-sec edges)
  (data.included_ids || []).forEach(function(id) {
    includedIds[id] = true;
    revealSecondaryEdges(id);
  });

  // Apply created nodes
  (data.created_nodes || []).forEach(function(cn) {
    createNewNodeFromImport(cn.id, cn.lat, cn.lon);
  });

  // Apply created edges
  (data.created_edges || []).forEach(function(ce) {
    addCreatedEdgeNoUndo(ce.from_id, ce.to_id, { edgeType: ce.type || "road", coords: ce.coords });
  });

  // Restore split-hidden edges
  if (data.split_hidden_edges) {
    // New format: explicit list
    data.split_hidden_edges.forEach(function(key) {
      if (key in edgeLineMap) splitHiddenEdges[key] = true;
    });
  } else {
    // Old files: heuristic — a deleted edge is split-hidden if created edges
    // form a path from u to v through created nodes
    var adj = {};
    createdEdges.forEach(function(ce) {
      var f = String(ce.from_id), t = String(ce.to_id);
      if (!adj[f]) adj[f] = [];
      if (!adj[t]) adj[t] = [];
      adj[f].push(t);
      adj[t].push(f);
    });
    Object.keys(deletedEdges).forEach(function(key) {
      var parts = key.split("_");
      var uv = parts[0].split("-");
      var u = String(parseInt(uv[0]));
      var v = String(parseInt(uv[1]));
      // BFS from u to v through created nodes only
      var visited = {};
      var queue = [u];
      visited[u] = true;
      var found = false;
      while (queue.length > 0 && !found) {
        var curr = queue.shift();
        var neighbors = adj[curr] || [];
        for (var i = 0; i < neighbors.length; i++) {
          var nb = neighbors[i];
          if (nb === v) { found = true; break; }
          if (!visited[nb] && nb.indexOf("new_") === 0) {
            visited[nb] = true;
            queue.push(nb);
          }
        }
      }
      if (found) splitHiddenEdges[key] = true;
    });
  }

  // Apply start/end nodes (support both old single and new multi format)
  var starts = data.start_ids || (data.start_id != null ? [data.start_id] : []);
  var ends = data.end_ids || (data.end_id != null ? [data.end_id] : []);
  starts.forEach(function(id) { startIds[id] = true; });
  ends.forEach(function(id) { endIds[id] = true; });

  // Refresh everything
  NODES.forEach(function(n) { updateMarkerStyle(n.id); });
  refreshAllEdges();
  refreshStats();
}

function createNewNodeFromImport(idx, lat, lon) {
  var id = "new_" + idx;
  if (idx >= nextNewId) nextNewId = idx + 1;
  createdNodes.push({ id: id, lat: lat, lon: lon });

  var marker = L.circleMarker([lat, lon], {
    radius: 7, fillColor: C_DELETED, color: "#fff", weight: 1.5, fillOpacity: 1.0, pane: 'nodePane'
  }).addTo(map);
  marker.bindTooltip(id, { permanent: false, direction: "top", offset: [0, -6], className: "node-label" });
  marker.on("click", function() { onNodeClick(id); });
  marker.on("mouseover", function() {
    document.getElementById("node-info").textContent =
      "Created node " + id + " | lat: " + lat.toFixed(5) + " lon: " + lon.toFixed(5);
  });
  createdMarkers[id] = marker;
}

/* ══════════════════════════════════════════════
   HAVERSINE
   ══════════════════════════════════════════════ */
function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function polylineLength(coords) {
  var total = 0;
  for (var i = 0; i < coords.length - 1; i++) {
    total += haversine(coords[i][0], coords[i][1], coords[i+1][0], coords[i+1][1]);
  }
  return total;
}

/* ══════════════════════════════════════════════
   AUTO-IMPORT (pre-loaded edits from backend)
   ══════════════════════════════════════════════ */
if (INITIAL_EDITS !== null) { applyImport(INITIAL_EDITS); }
// Always compute dead-end/lone status on initial load
refreshAllEdges();
</script>
